<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}ReStoreAI{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --accent:#22c55e;
    --nav:#111827;
}

body.light-mode{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#475569;
    --accent:#16a34a;
    --nav:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

/* NAVBAR */

nav{
    background:var(--nav);
    padding:18px 0;
    border-bottom:1px solid #334155;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo h2{
    font-size:22px;
}

.nav-links{
    display:flex;
    gap:20px;
    align-items:center;
}

.nav-links a{
    text-decoration:none;
    color:var(--muted);
    font-size:14px;
    padding:8px 16px;
    border-radius:8px;
}

.nav-links a:hover{
    background:var(--card);
}

.nav-links a.active{
    background:var(--accent);
    color:white;
}

/* THEME BUTTON */

.theme-toggle{
    padding:6px 16px;
    border-radius:20px;
    border:none;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:600;
}
/* MAIN CONTAINER */

.container{
    max-width:1200px;
    margin:50px auto;
    padding:0 30px;
}

/* CARD */

.card{
    background:var(--card);
    padding:40px;
    border-radius:20px;
    border:1px solid #334155;
}

/* BUTTONS */

button,
.btn{
    padding:12px 28px;
    background:var(--accent);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    text-decoration:none;
    display:inline-block;
}

button:hover,
.btn:hover{
    opacity:0.9;
}

body.light-mode button,
body.light-mode .btn{
    color:white !important;
}

/* REMOVE UNDERLINE */

a{
    text-decoration:none;
}

/* FOOTER */

.footer{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    margin-top:60px;
    border-top:1px solid #334155;
}

/* PROCESSING OVERLAY */

#processing-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,23,42,0.95);
    z-index:9999;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#processing-overlay.active{
    display:flex;
}

.proc-spinner{
    width:70px;
    height:70px;
    border:5px solid #1e293b;
    border-top:5px solid #22c55e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:30px;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

.proc-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.proc-sub{
    color:#94a3b8;
}


{% block extra_css %}{% endblock %}
</style>

</head>

<body>

<nav>

<div class="nav-container">

<div class="logo">
<span>🔧</span>
<h2>ReStoreAI</h2>
</div>

<div class="nav-links">

<a href="/" {% if page=='home' %}class="active"{% endif %}>Home</a>
<a href="/analyze" {% if page=='analyze' %}class="active"{% endif %}>Analyze</a>
<a href="/report" {% if page=='report' %}class="active"{% endif %}>Report</a>

<button class="theme-toggle" onclick="toggleTheme()">Theme</button>

</div>

</div>

</nav>

<div class="container">
{% block content %}{% endblock %}
</div>

<div class="footer">
<p>Powered by TensorFlow & MobileNetV2 | ReStoreAI © 2026</p>
</div>

<!-- Processing overlay -->

<div id="processing-overlay">

<div class="proc-spinner"></div>

<div class="proc-title">Analyzing Your Device...</div>

<div class="proc-sub">AI processing your image</div>

</div>

<script>

function toggleTheme(){
    document.body.classList.toggle("light-mode")
}

</script>

{% block extra_js %}{% endblock %}

</body>

</html>
