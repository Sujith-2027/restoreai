<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ReStoreAI{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --accent:#22c55e;
    --nav:#111827;
}

body.light-mode{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#475569;
    --accent:#16a34a;
    --nav:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:0.3s ease;
}

/* NAVBAR */
nav{
    background:var(--nav);
    padding:18px 0;
    border-bottom:1px solid #334155;
    position:sticky;
    top:0;
    z-index:100;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo h2{
    font-weight:700;
    font-size:22px;
    color:var(--text);
}

.nav-links{
    display:flex;
    gap:20px;
    align-items:center;
}

.nav-links a{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
    padding:8px 16px;
    border-radius:8px;
    transition:0.3s;
}

.nav-links a:hover{
    background:var(--card);
    color:var(--text);
}

.nav-links a.active{
    background:var(--accent);
    color:white;
}

/* THEME TOGGLE */
.theme-toggle{
    margin-left:15px;
    cursor:pointer;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid var(--accent);
    color:var(--accent);
    font-size:13px;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:50px auto;
    padding:0 30px;
}

/* CARD */
.card{
    background:var(--card);
    padding:40px;
    border-radius:20px;
    border:1px solid #334155;
    animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* TYPOGRAPHY */
h1{
    font-size:36px;
    font-weight:800;
    margin-bottom:20px;
    text-align:center;
    background:linear-gradient(90deg,var(--accent),#38bdf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

h2{
    font-size:28px;
    margin-bottom:20px;
}

h3{
    font-size:20px;
    margin:20px 0;
}

p{
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
}

/* BUTTON */
button,.btn{
    padding:12px 28px;
    background:linear-gradient(90deg,var(--accent),#16a34a);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
}

button:hover,.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(34,197,94,0.3);
}

/* FOOTER */
.footer{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    margin-top:60px;
    font-size:13px;
    border-top:1px solid #334155;
}

{% block extra_css %}{% endblock %}
</style>
</head>

<body>

<nav>
<div class="nav-container">
<div class="logo">
<span>🔧</span>
<h2>ReStoreAI</h2>
</div>

<div class="nav-links">
<a href="/" {% if page == 'home' %}class="active"{% endif %}>Home</a>
<a href="/analyze" {% if page == 'analyze' %}class="active"{% endif %}>Analyze</a>
<a href="/report" {% if page == 'report' %}class="active"{% endif %}>Report</a>

<button class="theme-toggle" onclick="toggleTheme()">🌙 Theme</button>
</div>
</div>
</nav>

<div class="container">
{% block content %}{% endblock %}
</div>

<div class="footer">
<p>Powered by TensorFlow & MobileNetV2 | ReStoreAI © 2026</p>
<p>AI-Based Device Classification & Repair Cost Estimation</p>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle("light-mode");
}
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
